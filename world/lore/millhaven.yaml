id: millhaven
name: Millhaven
type: town

summary: >
  A small crossroads trading town in the shadow of the Greypeak hills.

details:
  - Millhaven sits at the junction of the North Road and the River Way.
  - Population roughly 400, governed by Mayor Aldric.
  - Primary economy is farming, trade, and formerly silver mining.
  - The town has been uneasy since strange lights appeared near the old mine.
  - The Rusty Flagon is the only tavern and the social heart of the town.
  - A series of break-ins has rattled the merchant quarter in recent weeks.
  - The town guard is stretched thin — most were reassigned to the northern border.
