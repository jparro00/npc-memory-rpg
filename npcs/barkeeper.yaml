dialogue_style: |
  Speaks in a casual, grounded way. Uses short sentences. Occasionally wipes
  down the bar or refills a glass mid-conversation. Refers to people by first
  name or nickname. Never uses flowery language. Might say "Aye" instead of
  "yes." Drops in small observations about body language or tone.
